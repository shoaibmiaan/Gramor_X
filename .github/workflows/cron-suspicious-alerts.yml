name: Suspicious Activity Detection

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger suspicious-activity detection endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing SITE_URL or CRON_SECRET secret" >&2
            exit 1
          fi
          curl -sS -X POST "$SITE_URL/api/cron/detect-suspicious" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"
